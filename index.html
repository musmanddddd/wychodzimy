<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Wychodzimy! 🎒</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e07a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Wychodzimy!">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fdf8f5;--sf:#fff;--br:#ede4dc;--tx:#2a1f1a;--t2:#8a6f65;--ac:#e07a5f;--gn:#3d9970;--r:16px;--f:'Nunito',system-ui,sans-serif;--cm:#d4607a;--ca:#4e8dd9;--cr:#8f6ed4;--co:#3d9970;--cmb:#fde8ef;--cab:#deeafc;--crb:#ede5fb;--cob:#d6f0e4}
[data-dark="1"]{--bg:#18110e;--sf:#2b1e19;--br:#3d2e28;--tx:#f5ede8;--t2:#9a7d74;--cmb:#3b0f1e;--cab:#0e2040;--crb:#1e1540;--cob:#0e2e1e}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--tx);overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg)}

/* ── header ── */
.hd{background:var(--sf);border-bottom:1.5px solid var(--br);flex-shrink:0;padding:10px 14px 0}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:18px;font-weight:900;color:var(--ac)}
.hbs{display:flex;gap:4px}
.ib{width:34px;height:34px;border:none;background:var(--bg);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .1s}
.ib:active{background:var(--br)}

.pr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pb{flex:1;height:6px;background:var(--br);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),#f4a261);border-radius:3px;transition:width .3s;width:0%}
.pt{font-size:11px;font-weight:800;color:var(--t2);white-space:nowrap}

/* preset button */
.ps-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:800;border:none;cursor:pointer;font-family:var(--f);margin-bottom:7px;transition:all .15s;background:var(--ac);color:#fff;width:100%;justify-content:center}
.ps-btn.empty{background:var(--br);color:var(--t2)}
.ps-btn:active{opacity:.8}

/* child toggles - multi-select */
.cr{display:flex;gap:4px;margin-bottom:6px}
.cb{flex:1;padding:5px 2px;border:2px solid var(--br);background:var(--bg);border-radius:9px;font-size:10px;font-weight:800;cursor:pointer;color:var(--t2);font-family:var(--f);transition:all .12s;text-align:center;line-height:1.3}
.cb[data-c="marysia"].on{border-color:var(--cm);background:var(--cmb);color:var(--cm)}
.cb[data-c="antos"].on{border-color:var(--ca);background:var(--cab);color:var(--ca)}
.cb[data-c="rodzic"].on{border-color:var(--cr);background:var(--crb);color:var(--cr)}

/* cat filter */
.ctr{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.ctr::-webkit-scrollbar{display:none}
.cc{flex-shrink:0;padding:4px 9px;border:1.5px solid var(--br);background:var(--bg);border-radius:18px;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:var(--f);transition:all .12s}
.cc.on{background:var(--ac);border-color:var(--ac);color:#fff}

/* alt header */
.ah{background:var(--sf);border-bottom:1.5px solid var(--br);padding:13px 14px 10px;flex-shrink:0;display:none}
.ah h2{font-size:19px;font-weight:900}

/* content */
.ct{flex:1;overflow-y:auto;padding:6px 11px;-webkit-overflow-scrolling:touch}

/* items */
.gh{font-size:10px;font-weight:900;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;padding:11px 3px 4px}
.it{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--sf);border:1.5px solid var(--br);border-radius:var(--r);margin-bottom:5px;cursor:pointer;transition:transform .12s,opacity .2s;position:relative;overflow:hidden}
.it:active{transform:scale(.984)}
.it.chk{opacity:.35}
.it.chk .in{text-decoration:line-through;color:var(--t2)}
/* irrelevant */
.it.irr{opacity:.22;border-style:dashed}
.it.irr .in{text-decoration:line-through;color:var(--t2);font-style:italic}
/* left bar */
.it::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:2px}
.it.c-m::before{background:var(--cm)}.it.c-a::before{background:var(--ca)}.it.c-o::before{background:var(--co)}.it.c-r::before{background:var(--cr)}
.ck{width:26px;height:26px;border:2px solid var(--br);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg);transition:all .2s}
.it.chk .ck{background:var(--gn);border-color:var(--gn)}
.cv{color:#fff;font-size:12px;font-weight:900;opacity:0;transition:opacity .15s}
.it.chk .cv{opacity:1}
.ii{flex:1;min-width:0}
.in{font-size:13px;font-weight:700;line-height:1.3}
.im{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.bd{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800}
.b-m{background:var(--cmb);color:var(--cm)}.b-a{background:var(--cab);color:var(--ca)}.b-r{background:var(--crb);color:var(--cr)}.b-o{background:var(--cob);color:var(--co)}
.eb{width:30px;height:30px;border:none;background:none;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:13px;flex-shrink:0}
.eb:active{background:var(--bg)}

/* bottom nav */
.bn{display:flex;background:var(--sf);border-top:1.5px solid var(--br);padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.nb{flex:1;padding:7px 4px 5px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t2);font-size:9px;font-weight:800;font-family:var(--f);transition:color .12s}
.nb.on{color:var(--ac)}.ni{font-size:17px}

/* fab */
.fab{position:fixed;bottom:calc(52px + env(safe-area-inset-bottom,0));right:13px;width:48px;height:48px;background:var(--ac);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 3px 14px rgba(224,122,95,.4);display:flex;align-items:center;justify-content:center;z-index:5;transition:transform .2s;font-family:var(--f)}
.fab:active{transform:scale(.85)}

/* modal */
.md{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
.md.show{display:flex}
.sh{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:93dvh;overflow-y:auto;padding:0 16px calc(18px + env(safe-area-inset-bottom,0));animation:up .24s cubic-bezier(.32,.72,0,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ha{width:32px;height:4px;background:var(--br);border-radius:2px;margin:11px auto 14px}
.st{font-size:17px;font-weight:900;margin-bottom:12px}

/* form */
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:900;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--br);border-radius:10px;background:var(--bg);color:var(--tx);font-size:16px;font-family:var(--f);outline:none}
.fi:focus{border-color:var(--ac)}
select.fi{appearance:none;cursor:pointer}
.tg{display:flex;flex-wrap:wrap;gap:5px}
.tb{padding:5px 10px;border:1.5px solid var(--br);border-radius:8px;background:var(--bg);color:var(--t2);font-size:11px;font-weight:800;cursor:pointer;font-family:var(--f);transition:all .12s}
.tb.on{border-color:var(--ac);background:var(--ac);color:#fff}

/* child sel in modal */
.cs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.csb{padding:8px 6px;border:2px solid var(--br);border-radius:10px;background:var(--bg);cursor:pointer;text-align:center;font-family:var(--f);transition:all .12s}
.csb:active{transform:scale(.95)}
.csb .ce{font-size:19px}.csb .cl{font-size:10px;font-weight:800;margin-top:2px;color:var(--t2)}
.csb.on-m{border-color:var(--cm);background:var(--cmb)}.csb.on-m .cl{color:var(--cm)}
.csb.on-a{border-color:var(--ca);background:var(--cab)}.csb.on-a .cl{color:var(--ca)}
.csb.on-o{border-color:var(--co);background:var(--cob)}.csb.on-o .cl{color:var(--co)}
.csb.on-r{border-color:var(--cr);background:var(--crb)}.csb.on-r .cl{color:var(--cr)}

/* preset grid */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pgs{padding:7px 6px;border:1.5px solid var(--br);border-radius:9px;background:var(--bg);cursor:pointer;text-align:center;transition:all .12s;font-family:var(--f)}
.pgs:active{opacity:.7}
.pgs .pe{font-size:16px}.pgs .pn{font-size:10px;font-weight:800;color:var(--t2);margin-top:1px;line-height:1.2}
.pgs.on{border-color:var(--ac);background:rgba(224,122,95,.1)}.pgs.on .pn{color:var(--ac)}

/* preset select grid big */
.pgb{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pgc{padding:12px 8px;background:var(--bg);border:2px solid var(--br);border-radius:11px;cursor:pointer;transition:all .12s;text-align:center}
.pgc:active{transform:scale(.94)}
.pgc.sel{border-color:var(--ac);background:rgba(224,122,95,.1)}
.pgc .pe{font-size:22px}.pgc .pn{font-size:11px;font-weight:800;margin-top:3px;line-height:1.2}.pgc .pc{font-size:10px;color:var(--t2);margin-top:1px}

/* buttons */
.btn{width:100%;padding:12px;border:none;border-radius:11px;font-size:13px;font-weight:800;font-family:var(--f);cursor:pointer;transition:transform .12s}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--ac);color:#fff}
.btn-g{background:var(--bg);color:var(--tx);border:1.5px solid var(--br)}
.btn-d{background:#fde8e3;color:#b94030}
[data-dark="1"] .btn-d{background:#3b1510;color:#f4a090}
.brow{display:flex;gap:7px;margin-top:10px}.brow .btn{margin-top:0}

/* settings */
.sec{font-size:10px;font-weight:900;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;padding:13px 3px 6px}
.si{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--sf);border:1.5px solid var(--br);border-radius:11px;margin-bottom:5px}
.sl{font-size:13px;font-weight:700}.sd{font-size:10px;color:var(--t2);margin-top:1px}
.sw{width:40px;height:23px;background:var(--br);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--ac)}
.sw::after{content:'';width:17px;height:17px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.sw.on::after{transform:translateX(17px)}

.empty{text-align:center;padding:40px 16px;color:var(--t2)}.empty .ee{font-size:42px;margin-bottom:8px}.empty p{font-size:13px;font-weight:700}
</style>
</head>
<body>
<div id="app">
<div class="hd" id="hd-cl">
  <div class="ht"><div class="logo">🎒 Wychodzimy!</div><div class="hbs"><button class="ib" id="dk" onclick="togDark()">🌙</button><button class="ib" onclick="openM('m-rst')">↺</button></div></div>
  <div class="pr"><div class="pb"><div class="pf" id="pf"></div></div><div class="pt" id="ptx">0/0</div></div>
  <button class="ps-btn empty" id="ps" onclick="openM('m-ps')"><span id="psl">🎒 Wybierz typ wyjścia</span></button>
  <div class="cr" id="chldr"></div>
  <div class="ctr" id="catr"></div>
</div>
<div class="ah" id="hd-alt"><h2 id="alt-t"></h2></div>
<div class="ct" id="ct"></div>
<button class="fab" id="fab" onclick="openAdd()">＋</button>
<nav class="bn"><button class="nb on" id="n-cl" onclick="goV('cl')"><span class="ni">✅</span>Lista</button><button class="nb" id="n-pr" onclick="goV('pr')"><span class="ni">🗂️</span>Zestawy</button><button class="nb" id="n-st" onclick="goV('st')"><span class="ni">⚙️</span>Ustawienia</button></nav>
</div>

<!-- PRESET MODAL -->
<div class="md" id="m-ps" onclick="cbg(event,'m-ps')"><div class="sh"><div class="ha"></div><div class="st">Typ wyjścia</div><div class="pgb" id="ps-g"></div><div class="brow" style="margin-top:12px"><button class="btn btn-g" onclick="closeM('m-ps')">Anuluj</button><button class="btn btn-p" onclick="applyPs()">Zastosuj ✓</button></div><div style="margin-top:7px"><button class="btn btn-g" onclick="clearPs()">✕ Wyczyść zestaw</button></div></div></div>

<!-- ITEM MODAL -->
<div class="md" id="m-it" onclick="cbg(event,'m-it')"><div class="sh"><div class="ha"></div><div class="st" id="it-t">Dodaj rzecz</div>
<div class="fg"><label class="fl">Nazwa</label><input class="fi" type="text" id="it-n" placeholder="np. pieluszki" autocomplete="off"></div>
<div class="fg"><label class="fl">Kategoria</label><select class="fi" id="it-c"></select></div>
<div class="fg"><label class="fl">Dla kogo</label><div class="cs"><div class="csb" data-cc="marysia" onclick="sIC('marysia')"><div class="ce">👧</div><div class="cl">Marysia</div></div><div class="csb" data-cc="antos" onclick="sIC('antos')"><div class="ce">👦</div><div class="cl">Antoś</div></div><div class="csb" data-cc="oba" onclick="sIC('oba')"><div class="ce">👪</div><div class="cl">Oboje</div></div><div class="csb" data-cc="rodzic" onclick="sIC('rodzic')"><div class="ce">🧑</div><div class="cl">Rodzic</div></div></div></div>
<div class="fg"><label class="fl">Zestawy wyjść</label><div class="pg" id="it-ps"></div></div>
<div class="brow"><button class="btn btn-g" onclick="closeM('m-it')">Anuluj</button><button class="btn btn-p" onclick="saveIt()">Zapisz</button></div>
<div id="it-d" style="display:none;margin-top:7px"><button class="btn btn-d" onclick="delIt()">🗑️ Usuń</button></div>
</div></div>

<!-- RESET MODAL -->
<div class="md" id="m-rst" onclick="cbg(event,'m-rst')"><div class="sh"><div class="ha"></div><div class="st">Resetuj checklistę?</div><p style="color:var(--t2);font-size:13px;line-height:1.5;margin-bottom:14px">Odznacz wszystkie rzeczy. Zestaw pozostanie.</p><div class="brow"><button class="btn btn-g" onclick="closeM('m-rst')">Anuluj</button><button class="btn btn-p" onclick="doRst()">Resetuj ✓</button></div></div></div>

// ── STATE ──
let S={items:[],dark:0,preset:null,chFilt:{marysia:true,antos:true,rodzic:true},cat:'all',view:'cl',onlyUnch:0,reqFirst:0,editId:null,selPs:null,iCh:'o',iPs:[]};
const K1='w4i',K2='w4s';

function save(){
  localStorage.setItem(K1,JSON.stringify(S.items));
  localStorage.setItem(K2,JSON.stringify({dark:S.dark,preset:S.preset,onlyUnch:S.onlyUnch,reqFirst:S.reqFirst}));
}
function load(){
  try{
    const r=localStorage.getItem(K1);
    S.items=r?JSON.parse(r).map(i=>({...i,irr:i.irr||0})):mkDef();
    const c=localStorage.getItem(K2);
    if(c){const o=JSON.parse(c);S.dark=o.dark||0;S.preset=o.preset||null;S.onlyUnch=o.onlyUnch||0;S.reqFirst=o.reqFirst||0;}
  }catch{S.items=mkDef();}
}
function mkDef(){
  return IDEF.map(i=>({id:i.id,cat:i.cat,n:i.n,ch:i.ch,ps:JSON.parse(JSON.stringify(i.ps)),chk:0,irr:0}));
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Does item belong to current preset+child filter?
function itemInPreset(item){
  if(!S.preset) return true;
  const pa=item.ps[S.preset];
  if(!pa) return false;
  // pa=[a,m,r]
  return pa[0]||pa[1]||pa[2];
}

function itemMatchesChild(item){
  const f=S.chFilt;
  const ch=item.ch;
  if(ch==='o') return f.marysia||f.antos; // oba → show if either child is on
  if(ch==='m') return f.marysia;
  if(ch==='a') return f.antos;
  if(ch==='r') return f.rodzic;
  return true;
}

function getVis(){
  let items=[...S.items];
  items=items.filter(i=>itemInPreset(i));
  items=items.filter(i=>itemMatchesChild(i));
  if(S.cat!=='all') items=items.filter(i=>i.cat===S.cat);
  if(S.onlyUnch) items=items.filter(i=>!i.chk&&!i.irr);
  // sort: irrelevant at bottom
  items.sort((a,b)=>(a.irr||0)-(b.irr||0));
  return items;
}

function presetItemCount(pid){
  return S.items.filter(i=>{const p=i.ps[pid];return p&&(p[0]||p[1]||p[2]);}).length;
}

// ── RENDER CHECKLIST ──
function rCL(){
  const items=getVis();
  const notIrr=items.filter(i=>!i.irr);
  const chk=notIrr.filter(i=>i.chk).length;
  const tot=notIrr.length;
  document.getElementById('pf').style.width=tot?(chk/tot*100)+'%':'0%';
  document.getElementById('ptx').textContent=chk+'/'+tot;
  if(!items.length){
    document.getElementById('ct').innerHTML=`<div class="empty"><div class="ee">${S.onlyUnch?'🎉':'🔍'}</div><p>${S.onlyUnch?'Wszystko spakowane!':'Brak rzeczy'}</p></div>`;return;
  }
  let h='';
  if(S.cat==='all'){
    const g={};items.forEach(i=>(g[i.cat]=g[i.cat]||[]).push(i));
    CATS.forEach(c=>{if(g[c.id]?.length){h+=`<div class="gh">${c.n}</div>`;g[c.id].forEach(i=>h+=iH(i));}});
  }else items.forEach(i=>h+=iH(i));
  document.getElementById('ct').innerHTML=h;
}

function chClass(ch){return ch==='m'?'c-m':ch==='a'?'c-a':ch==='r'?'c-r':'c-o';}
function chBadge(ch){
  if(ch==='m')return'<span class="bd b-m">👧 Marysia</span>';
  if(ch==='a')return'<span class="bd b-a">👦 Antoś</span>';
  if(ch==='r')return'<span class="bd b-r">🧑 Rodzic</span>';
  return'';
}

function iH(i){
  const bg=[];
  const allOn=S.chFilt.marysia&&S.chFilt.antos&&S.chFilt.rodzic;
  if(allOn&&i.ch!=='o')bg.push(chBadge(i.ch));
  const cls=['it',chClass(i.ch)];
  if(i.chk)cls.push('chk');
  if(i.irr)cls.push('irr');
  return`<div class="${cls.join(' ')}" onclick="tog('${i.id}')">
<div class="ck"><span class="cv">✓</span></div>
<div class="ii"><div class="in">${esc(i.n)}</div>${bg.length?`<div class="im">${bg.join('')}</div>`:''}</div>
<button class="eb" onclick="event.stopPropagation();markIrr('${i.id}')" title="Nieważne" style="font-size:11px;opacity:.5">🚫</button>
<button class="eb" onclick="event.stopPropagation();openEd('${i.id}')">✏️</button>
</div>`;
}

function rCat(){
  let h=`<button class="cc${S.cat==='all'?' on':''}" onclick="sCat('all')">Wszystkie</button>`;
  CATS.forEach(c=>h+=`<button class="cc${S.cat===c.id?' on':''}" onclick="sCat('${c.id}')">${c.n}</button>`);
  document.getElementById('catr').innerHTML=h;
}

function rChild(){
  document.getElementById('chldr').innerHTML=
    `<button class="cb${S.chFilt.marysia?' on':''}" data-c="marysia" onclick="tCh('marysia')">👧<br>Marysia</button>`+
    `<button class="cb${S.chFilt.antos?' on':''}" data-c="antos" onclick="tCh('antos')">👦<br>Antoś</button>`+
    `<button class="cb${S.chFilt.rodzic?' on':''}" data-c="rodzic" onclick="tCh('rodzic')">🧑<br>Rodzic</button>`;
}

function rPsChip(){
  const p=S.preset?OCCS.find(x=>x.id===S.preset):null;
  const el=document.getElementById('ps');
  document.getElementById('psl').textContent=p?p.e+' '+p.n:'🎒 Wybierz typ wyjścia';
  el.className='ps-btn'+(p?'':' empty');
}

// ── ACTIONS ──
function tog(id){const i=S.items.find(x=>x.id===id);if(i&&!i.irr){i.chk=i.chk?0:1;save();rCL();}}
function markIrr(id){const i=S.items.find(x=>x.id===id);if(i){i.irr=i.irr?0:1;if(i.irr)i.chk=0;save();rCL();}}
function sCat(c){S.cat=c;rCat();rCL();}
function tCh(c){S.chFilt[c]=!S.chFilt[c];if(!S.chFilt.marysia&&!S.chFilt.antos&&!S.chFilt.rodzic)S.chFilt[c]=true;rChild();rCL();}
function doRst(){S.items.forEach(i=>{i.chk=0;i.irr=0;});save();closeM('m-rst');rCL();}
function restDef(){if(confirm('Przywrócić domyślną listę?')){S.items=mkDef();save();rCL();}}

// Dark
function togDark(){S.dark=S.dark?0:1;apDark();save();if(S.view==='st')rST();}
function apDark(){document.documentElement.setAttribute('data-dark',S.dark?'1':'0');document.getElementById('dk').textContent=S.dark?'☀️':'🌙';}
function togUnch(){S.onlyUnch=S.onlyUnch?0:1;save();rST();rCL();}

// Preset
function openPsM(){S.selPs=S.preset;rPM();openM('m-ps');}
function rPM(){
  document.getElementById('ps-g').innerHTML=OCCS.map(p=>
    `<div class="pgc${S.selPs===p.id?' sel':''}" onclick="sPtmp('${p.id}')"><div class="pe">${p.e}</div><div class="pn">${p.n}</div><div class="pc">${presetItemCount(p.id)} rzeczy</div></div>`
  ).join('');
}
function sPtmp(id){S.selPs=S.selPs===id?null:id;rPM();}
function applyPs(){S.preset=S.selPs;save();closeM('m-ps');rPsChip();rCL();}
function clearPs(){S.preset=null;S.selPs=null;save();closeM('m-ps');rPsChip();rCL();}
function actPs(id){S.preset=S.preset===id?null:id;save();rPsChip();rPR();}

// Item modal
function bCats(){document.getElementById('it-c').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.n}</option>`).join('');}
function rIP(){
  document.getElementById('it-ps').innerHTML=OCCS.map(p=>
    `<div class="pgs${S.iPs.includes(p.id)?' on':''}" onclick="tIP('${p.id}')"><div class="pe">${p.e}</div><div class="pgn pn">${p.n}</div></div>`
  ).join('');
}
function sIC(c){
  S.iCh=c;
  document.querySelectorAll('.csb').forEach(b=>{
    const cc=b.dataset.cc;
    const map={marysia:'on-m',antos:'on-a',oba:'on-o',rodzic:'on-r'};
    b.className='csb'+(cc===c?' '+map[cc]:'');
  });
}
function tIP(pid){if(S.iPs.includes(pid))S.iPs=S.iPs.filter(x=>x!==pid);else S.iPs.push(pid);rIP();}
function openAdd(){
  S.editId=null;S.iCh='o';S.iPs=S.preset?[S.preset]:[];
  document.getElementById('it-t').textContent='Dodaj rzecz';
  document.getElementById('it-n').value='';
  document.getElementById('it-d').style.display='none';
  bCats();sIC('o');rIP();openM('m-it');
  setTimeout(()=>document.getElementById('it-n').focus(),300);
}
function openEd(id){
  const i=S.items.find(x=>x.id===id);if(!i)return;
  S.editId=id;S.iCh=i.ch||'o';
  S.iPs=Object.keys(i.ps||{}).filter(k=>{const v=i.ps[k];return v&&(v[0]||v[1]||v[2]);});
  document.getElementById('it-t').textContent='Edytuj: '+i.n;
  document.getElementById('it-n').value=i.n;
  document.getElementById('it-d').style.display='block';
  bCats();document.getElementById('it-c').value=i.cat;
  sIC(S.iCh);rIP();openM('m-it');
}
function saveIt(){
  const n=document.getElementById('it-n').value.trim();
  if(!n){document.getElementById('it-n').focus();return;}
  const cat=document.getElementById('it-c').value;
  const chMap={m:[0,1,0],a:[1,0,0],o:[1,1,0],r:[0,0,1]};
  const pv=chMap[S.iCh]||[1,1,0];
  const ps={};S.iPs.forEach(pid=>ps[pid]=[...pv]);
  if(S.editId){const i=S.items.find(x=>x.id===S.editId);if(i){i.n=n;i.cat=cat;i.ch=S.iCh;i.ps=ps;}}
  else S.items.push({id:'u'+Date.now(),cat,n,ch:S.iCh,ps,chk:0,irr:0});
  save();closeM('m-it');rCL();
}
function delIt(){if(!S.editId)return;if(confirm('Usunąć?')){S.items=S.items.filter(x=>x.id!==S.editId);save();closeM('m-it');rCL();}}

// Presets view
function rPR(){
  let h='<div class="pgb">';
  OCCS.forEach(p=>{const a=S.preset===p.id;h+=`<div class="pgc${a?' sel':''}" onclick="actPs('${p.id}')"><div class="pe">${p.e}</div><div class="pn">${p.n}</div><div class="pc">${presetItemCount(p.id)} rzeczy</div>${a?'<div style="font-size:10px;color:var(--ac);font-weight:800;margin-top:2px">✓ Aktywny</div>':''}</div>`;});
  h+='</div>';
  if(S.preset)h+=`<div style="margin-top:10px"><button class="btn btn-g" onclick="clearPsV()">✕ Wyczyść zestaw</button></div>`;
  document.getElementById('ct').innerHTML=h;
}
function clearPsV(){S.preset=null;save();rPsChip();rPR();}

// Settings
function rST(){
  document.getElementById('ct').innerHTML=`
  <div class="sec">Wyświetlanie</div>
  <div class="si" onclick="togDark()" style="cursor:pointer"><div><div class="sl">🌙 Tryb ciemny</div></div><div class="sw${S.dark?' on':''}"></div></div>
  <div class="si" onclick="togUnch()" style="cursor:pointer"><div><div class="sl">👁️ Tylko niespakowane</div><div class="sd">Ukryj odhaczone i nieważne</div></div><div class="sw${S.onlyUnch?' on':''}"></div></div>
  <div class="sec">Checklista</div>
  <div class="si" onclick="openM('m-rst')" style="cursor:pointer"><div><div class="sl">🔄 Resetuj checklistę</div><div class="sd">Odznacz wszystkie + przywróć nieważne</div></div><span style="color:var(--t2)">›</span></div>
  <div class="si" onclick="restDef()" style="cursor:pointer"><div><div class="sl">♻️ Przywróć domyślną listę</div><div class="sd">Usuwa własne zmiany</div></div><span style="color:var(--t2)">›</span></div>
  <div class="sec">O aplikacji</div>
  <div class="si"><div><div class="sl">🎒 Wychodzimy! v3.0</div><div class="sd">👧 Marysia & 👦 Antoś • Offline</div></div></div>`;
}

// Views
function goV(v){
  S.view=v;['cl','pr','st'].forEach(x=>document.getElementById('n-'+x).classList.toggle('on',x===v));
  const ch=document.getElementById('hd-cl'),ah=document.getElementById('hd-alt'),fb=document.getElementById('fab');
  if(v==='cl'){ch.style.display='';ah.style.display='none';fb.style.display='';rCat();rChild();rCL();}
  else if(v==='pr'){ch.style.display='none';ah.style.display='';fb.style.display='none';document.getElementById('alt-t').textContent='🗂️ Zestawy wyjść';rPR();}
  else{ch.style.display='none';ah.style.display='';fb.style.display='none';document.getElementById('alt-t').textContent='⚙️ Ustawienia';rST();}
}

// Modal
function openM(id){document.getElementById(id).classList.add('show');}
function closeM(id){document.getElementById(id).classList.remove('show');}
function cbg(e,id){if(e.target===e.currentTarget)closeM(id);}

// Override preset button to open modal
document.getElementById('ps').onclick=function(){S.selPs=S.preset;rPM();openM('m-ps');};

// Init
function init(){load();apDark();rCat();rChild();rPsChip();bCats();rCL();
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});}
init();
</script>
